<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log-in</title>
    <link rel="stylesheet" href="style2.css">
    <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/uicons-regular-rounded/css/uicons-regular-rounded.css">
</head>
<body>
    <div class="container">

        <div class="form-container">
            <div class="header">
                <p>Please enter your details </p>
                <h1>Welcome</h1>
            </div>
            <form class="form-box">
                <div class="input">
                    <input type="email" class="text" placeholder="" required>
                    <label for="email" class="float">Email address</label>
                </div>
                <div class="input" id="newpassword">
                    <input type="password" class="text" placeholder="" class="pass"required>
                    <label for="password" id="password" class="float">Password</label>
                </div>
                
                <div class="eye-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-eye-icon lucide-eye"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/></svg>
                </div>

                <div class="input-grp checkbox-grp">
                    <div class="form-check">
                        <input type="checkbox" class="check" required>
                        <label for="checkbox">Remember me</label>
                    </div>
        
                    
                    <div class="forgot-password">
                        <a href="">Forget password?</a>
                    </div>
                </div>

                <button class="btn" onclick="openPopup()" >Sign In</button>

            </form>     
            <div class="form-bottom">
                    <div class="divider">
                        <p>Or</p>

                    </div>
                    
                <div class="social-icons">
                    <a href="https://accounts.google.com/v3/signin/identifier?continue=https%3A%2F%2Faccounts.google.com%2F&dsh=S1393841024%3A1782005429720157&followup=https%3A%2F%2Faccounts.google.com%2F&passive=1209600&flowName=GlifWebSignIn&flowEntry=ServiceLogin&ifkv=AcDsRvznmzU7tRuvAcGXK1nm5AYxaywWlnYBgJOUrlKyfdqNJY7II_lVamsGOLvqndFDxDhUsTiYUw" target="_blank">
   
                        <button class="social-links">
                            <img src="images/google.svg" target="_blank" class="img" alt="">
                        </button>
                    </a>
                    <a href="https://www.facebook.com/login/?next=https%3A%2F%2Fwww.facebook.com%2F" target="_blank">
                        <button class="social-links">
                            <img src="images/facebook.svg" class="img" alt="">
                        </button>
                    </a>
                    <a href="https://account.apple.com/sign-in" target="_blank" >
                        <button class="social-links">
                                <img src="images/apple.svg" class="img" alt="">
                        </button>
                    </a>
                </div> 
                        


                <div class="out">
                    <p>Don't have an account? <a href="">Sign Up</a></p>
                </div>
            </form-bottom>
        </div>
        
    </div>
    <div class="popup" id="popup">
        <div class="popup-content">
            <button class=""><img src="images/correct.svg" id="tick" class="popup-logo" > </button>
           <div class="write">
                <h1>Thank You,</h1>
                <p>The backend is not created by my<br><span> lazy developer..</span> ps: frontend is broke too </p>
            </div>
            <button onclick="closePopup"><img src="images/cross.svg"id="cross" class="popup-logo" > </button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
